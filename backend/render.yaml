services:
  - type: web
    name: tuition-management-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromEnvVar: DATABASE_URL
      - key: PYTHON_VERSION
        value: 3.10.0
